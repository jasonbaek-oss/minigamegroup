<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지뢰찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #e94560;
      text-shadow: 0 0 10px #e9456066;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      padding: 7px 18px;
      border: 2px solid #e94560;
      border-radius: 20px;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .diff-btn:hover, .diff-btn.active {
      background: #e94560;
      color: #fff;
    }

    #status-bar {
      display: flex;
      gap: 30px;
      margin-bottom: 14px;
      align-items: center;
      font-size: 1.1rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-icon { font-size: 1.3rem; }
    .stat-val { font-weight: bold; font-size: 1.2rem; min-width: 36px; text-align: center; }

    #reset-btn {
      padding: 8px 22px;
      border: none;
      border-radius: 20px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s, background 0.2s;
    }

    #reset-btn:hover { background: #c73652; transform: scale(1.05); }
    #reset-btn:active { transform: scale(0.97); }

    #board-wrapper {
      border: 3px solid #e9456055;
      border-radius: 10px;
      padding: 10px;
      background: #16213e;
      box-shadow: 0 0 30px #e9456033;
      overflow: auto;
      max-width: 98vw;
    }

    #board {
      display: grid;
      gap: 2px;
      user-select: none;
    }

    .cell {
      width: 34px;
      height: 34px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      border: 1px solid transparent;
    }

    .cell.hidden {
      background: #0f3460;
      border-color: #1a5276;
    }

    .cell.hidden:hover {
      background: #1a4a80;
      transform: scale(1.08);
    }

    .cell.flagged {
      background: #0f3460;
      border-color: #e94560;
    }

    .cell.revealed {
      background: #0a1628;
      border-color: #0f3460;
      cursor: default;
    }

    .cell.mine-hit {
      background: #e94560;
      border-color: #ff6b6b;
    }

    .cell.mine-show {
      background: #1a1a2e;
      border-color: #555;
    }

    .n1 { color: #4fc3f7; }
    .n2 { color: #81c784; }
    .n3 { color: #e57373; }
    .n4 { color: #9c64a6; }
    .n5 { color: #ff7043; }
    .n6 { color: #26c6da; }
    .n7 { color: #ec407a; }
    .n8 { color: #bdbdbd; }

    #message {
      margin-top: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 30px;
      text-align: center;
    }

    .msg-win { color: #81c784; text-shadow: 0 0 10px #81c78488; }
    .msg-lose { color: #e94560; text-shadow: 0 0 10px #e9456088; }

    #timer-bar {
      width: 100%;
      height: 4px;
      background: #0f3460;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>💣 지뢰찾기</h1>

  <div id="controls">
    <button class="diff-btn active" data-diff="easy">쉬움 (9×9)</button>
    <button class="diff-btn" data-diff="medium">보통 (16×16)</button>
    <button class="diff-btn" data-diff="hard">어려움 (30×16)</button>
    <button id="reset-btn">새 게임</button>
  </div>

  <div id="status-bar">
    <div class="stat">
      <span class="stat-icon">🚩</span>
      <span class="stat-val" id="flag-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-icon">⏱</span>
      <span class="stat-val" id="timer">0</span>
    </div>
    <div class="stat">
      <span class="stat-icon">💣</span>
      <span class="stat-val" id="mine-count">0</span>
    </div>
  </div>

  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <div id="message"></div>

  <script>
    const DIFFICULTIES = {
      easy:   { rows: 9,  cols: 9,  mines: 10 },
      medium: { rows: 16, cols: 16, mines: 40 },
      hard:   { rows: 16, cols: 30, mines: 99 },
    };

    const COLORS = ['', 'n1','n2','n3','n4','n5','n6','n7','n8'];

    let config = DIFFICULTIES.easy;
    let grid = [];
    let revealed = [];
    let flagged = [];
    let minePositions = new Set();
    let gameOver = false;
    let gameWon = false;
    let firstClick = true;
    let timerInterval = null;
    let seconds = 0;

    function init() {
      clearInterval(timerInterval);
      seconds = 0;
      gameOver = false;
      gameWon = false;
      firstClick = true;

      document.getElementById('timer').textContent = '0';
      document.getElementById('flag-count').textContent = '0';
      document.getElementById('mine-count').textContent = config.mines;
      document.getElementById('message').textContent = '';
      document.getElementById('message').className = '';

      const { rows, cols } = config;
      grid = Array.from({ length: rows }, () => Array(cols).fill(0));
      revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
      flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
      minePositions = new Set();

      renderBoard();
    }

    function placeMines(safeR, safeC) {
      const { rows, cols, mines } = config;
      const safe = new Set();
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = safeR + dr, nc = safeC + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
            safe.add(nr * cols + nc);
        }

      while (minePositions.size < mines) {
        const pos = Math.floor(Math.random() * rows * cols);
        if (!safe.has(pos)) minePositions.add(pos);
      }

      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (minePositions.has(r * cols + c)) grid[r][c] = -1;

      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === -1) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && grid[nr][nc] === -1)
                count++;
            }
          grid[r][c] = count;
        }
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${config.cols}, 34px)`;
      board.innerHTML = '';

      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell hidden';
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener('click', onLeftClick);
          cell.addEventListener('contextmenu', onRightClick);
          board.appendChild(cell);
        }
      }
    }

    function getCellEl(r, c) {
      return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    }

    function updateCell(r, c) {
      const el = getCellEl(r, c);
      if (!el) return;

      if (flagged[r][c]) {
        el.className = 'cell flagged';
        el.textContent = '🚩';
        return;
      }

      if (!revealed[r][c]) {
        el.className = 'cell hidden';
        el.textContent = '';
        return;
      }

      const val = grid[r][c];
      if (val === -1) {
        el.className = 'cell mine-show';
        el.textContent = '💣';
      } else {
        el.className = 'cell revealed';
        if (val > 0) {
          el.textContent = val;
          el.classList.add(COLORS[val]);
        } else {
          el.textContent = '';
        }
      }
    }

    function onLeftClick(e) {
      if (gameOver || gameWon) return;
      const r = +e.currentTarget.dataset.r;
      const c = +e.currentTarget.dataset.c;
      if (flagged[r][c] || revealed[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        startTimer();
      }

      reveal(r, c);
      checkWin();
    }

    function onRightClick(e) {
      e.preventDefault();
      if (gameOver || gameWon) return;
      const r = +e.currentTarget.dataset.r;
      const c = +e.currentTarget.dataset.c;
      if (revealed[r][c]) return;

      flagged[r][c] = !flagged[r][c];
      updateCell(r, c);
      updateFlagCount();
    }

    function reveal(r, c) {
      if (r < 0 || r >= config.rows || c < 0 || c >= config.cols) return;
      if (revealed[r][c] || flagged[r][c]) return;

      revealed[r][c] = true;

      if (grid[r][c] === -1) {
        const el = getCellEl(r, c);
        el.className = 'cell mine-hit';
        el.textContent = '💣';
        triggerGameOver();
        return;
      }

      updateCell(r, c);

      if (grid[r][c] === 0) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            if (dr !== 0 || dc !== 0)
              reveal(r + dr, c + dc);
      }
    }

    function triggerGameOver() {
      gameOver = true;
      clearInterval(timerInterval);

      for (let r = 0; r < config.rows; r++)
        for (let c = 0; c < config.cols; c++)
          if (grid[r][c] === -1 && !revealed[r][c]) {
            revealed[r][c] = true;
            updateCell(r, c);
          }

      const msg = document.getElementById('message');
      msg.textContent = '💥 게임 오버! 다시 도전해보세요.';
      msg.className = 'msg-lose';
    }

    function checkWin() {
      const { rows, cols, mines } = config;
      let unrevealedSafe = 0;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (!revealed[r][c] && grid[r][c] !== -1)
            unrevealedSafe++;

      if (unrevealedSafe === 0) {
        gameWon = true;
        clearInterval(timerInterval);
        const msg = document.getElementById('message');
        msg.textContent = `🎉 클리어! ${seconds}초 만에 성공했습니다!`;
        msg.className = 'msg-win';

        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            if (!flagged[r][c] && grid[r][c] === -1) {
              flagged[r][c] = true;
              updateCell(r, c);
            }
        updateFlagCount();
      }
    }

    function updateFlagCount() {
      let count = 0;
      for (let r = 0; r < config.rows; r++)
        for (let c = 0; c < config.cols; c++)
          if (flagged[r][c]) count++;
      document.getElementById('flag-count').textContent = count;
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = seconds;
      }, 1000);
    }

    document.getElementById('reset-btn').addEventListener('click', init);

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        config = DIFFICULTIES[btn.dataset.diff];
        init();
      });
    });

    init();
  </script>
</body>
</html>
