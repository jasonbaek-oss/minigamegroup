<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 스네이크</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e; color: #e8eaf6;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding-top: 60px;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(26,26,46,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 28px;
    }
    .nav-back { color: #8892b0; text-decoration: none; font-size: 0.88rem; transition: color .2s; }
    .nav-back:hover { color: #e8eaf6; }
    .nav-title { font-size: 1rem; font-weight: 700; color: #81c784; }

    h1 { font-size: 2rem; margin: 24px 0 6px; color: #81c784; font-weight: 800; }

    .top-bar {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 18px; flex-wrap: wrap; justify-content: center;
    }
    .stat-box {
      background: #16213e; border: 1px solid rgba(129,199,132,0.3);
      border-radius: 10px; padding: 8px 20px; text-align: center; min-width: 90px;
    }
    .stat-label { font-size: 0.65rem; color: #8892b0; letter-spacing: 1px; text-transform: uppercase; }
    .stat-val { font-size: 1.4rem; font-weight: 800; color: #81c784; }

    .new-btn {
      padding: 9px 22px; border: none; border-radius: 20px;
      background: #4caf50; color: #fff; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; transition: background .2s, transform .15s;
    }
    .new-btn:hover { background: #388e3c; transform: scale(1.04); }

    .canvas-wrap {
      border: 2px solid rgba(129,199,132,0.3); border-radius: 12px;
      box-shadow: 0 0 40px rgba(129,199,132,0.1); overflow: hidden;
    }
    #canvas { display: block; }

    .hint { margin-top: 16px; color: #8892b0; font-size: 0.82rem; text-align: center; line-height: 1.7; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-back">← 허브로</a>
  <span class="nav-title">🐍 스네이크</span>
  <span></span>
</nav>

<h1>스네이크</h1>

<div class="top-bar">
  <div class="stat-box">
    <div class="stat-label">점수</div>
    <div class="stat-val" id="score">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">최고</div>
    <div class="stat-val" id="best">0</div>
  </div>
  <button class="new-btn" id="newBtn">새 게임</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="400" height="400"></canvas>
</div>

<p class="hint">방향키로 조작 · 먹이를 먹을수록 빨라집니다<br>R키로 재시작</p>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const COLS=20, ROWS=20, CELL=20;

  let snake, dir, nextDir, food, score, best=0, speed, gameOver, started, ticker;

  function init() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score=0; speed=150; gameOver=false; started=false;
    if (ticker) clearInterval(ticker);
    ticker = null;
    spawnFood();
    render();
    document.getElementById('score').textContent = '0';
  }

  function spawnFood() {
    do {
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    } while (snake.some(s=>s.x===food.x&&s.y===food.y));
  }

  function step() {
    dir = {...nextDir};
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||
        snake.some(s=>s.x===head.x&&s.y===head.y)) {
      gameOver=true;
      clearInterval(ticker);
      render(); return;
    }

    snake.unshift(head);
    if (head.x===food.x&&head.y===food.y) {
      score+=10;
      if (score>best) { best=score; document.getElementById('best').textContent=best; }
      document.getElementById('score').textContent=score;
      spawnFood();
      if (score%50===0 && speed>70) {
        speed-=10;
        clearInterval(ticker);
        ticker=setInterval(step, speed);
      }
    } else {
      snake.pop();
    }
    render();
  }

  function render() {
    // Background
    ctx.fillStyle='#0a1628';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Grid
    ctx.strokeStyle='rgba(15,52,96,0.5)';
    ctx.lineWidth=0.5;
    for (let i=0;i<=COLS;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,ROWS*CELL); ctx.stroke();
    }
    for (let i=0;i<=ROWS;i++) {
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(COLS*CELL,i*CELL); ctx.stroke();
    }

    // Food
    ctx.save();
    ctx.shadowColor='#e94560'; ctx.shadowBlur=10;
    ctx.fillStyle='#e94560';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Snake
    snake.forEach((seg,i) => {
      const t = i/snake.length;
      ctx.globalAlpha = 1 - t*0.55;
      if (i===0) {
        ctx.save();
        ctx.shadowColor='#4fc3f7'; ctx.shadowBlur=8;
        ctx.fillStyle='#4fc3f7';
      } else {
        ctx.fillStyle='#81c784';
      }
      const r=i===0?6:4;
      const px=seg.x*CELL+2, py=seg.y*CELL+2, s=CELL-4;
      ctx.beginPath();
      ctx.moveTo(px+r,py);
      ctx.arcTo(px+s,py, px+s,py+s, r);
      ctx.arcTo(px+s,py+s, px,py+s, r);
      ctx.arcTo(px,py+s, px,py, r);
      ctx.arcTo(px,py, px+s,py, r);
      ctx.closePath();
      ctx.fill();
      if (i===0) ctx.restore();
    });
    ctx.globalAlpha=1;

    // Overlays
    if (!started && !gameOver) {
      ctx.fillStyle='rgba(10,22,40,0.72)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#81c784';
      ctx.font='bold 20px Segoe UI';
      ctx.textAlign='center';
      ctx.fillText('방향키로 시작', canvas.width/2, canvas.height/2-8);
      ctx.fillStyle='#8892b0';
      ctx.font='14px Segoe UI';
      ctx.fillText('벽이나 몸에 닿으면 게임 오버', canvas.width/2, canvas.height/2+18);
    }

    if (gameOver) {
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#e94560';
      ctx.font='bold 28px Segoe UI';
      ctx.textAlign='center';
      ctx.fillText('게임 오버!', canvas.width/2, canvas.height/2-24);
      ctx.fillStyle='#e8eaf6';
      ctx.font='18px Segoe UI';
      ctx.fillText(`점수: ${score}`, canvas.width/2, canvas.height/2+10);
      ctx.fillStyle='#8892b0';
      ctx.font='14px Segoe UI';
      ctx.fillText('R키 또는 버튼으로 재시작', canvas.width/2, canvas.height/2+36);
    }
  }

  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp':    if (dir.y!==1)  nextDir={x:0,y:-1}; break;
      case 'ArrowDown':  if (dir.y!==-1) nextDir={x:0,y:1};  break;
      case 'ArrowLeft':  if (dir.x!==1)  nextDir={x:-1,y:0}; break;
      case 'ArrowRight': if (dir.x!==-1) nextDir={x:1,y:0};  break;
      case 'r': case 'R': init(); return;
      default: return;
    }
    e.preventDefault();
    if (!started && !gameOver) {
      started=true;
      ticker=setInterval(step, speed);
    }
  });

  document.getElementById('newBtn').addEventListener('click', init);

  init();
</script>
</body>
</html>
